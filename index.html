<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Kitchen Stock</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #EDEDED; min-height: 100vh; }
    table { border-collapse: collapse; }
    input, button, select { font-family: inherit; }
    ::-webkit-scrollbar { height: 4px; width: 4px; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useRef, useEffect } = React;

// ── Column colours ────────────────────────────────────────────────────────────
const COL_COLORS = {
  stock:  { bg: "#FFD966", text: "#5a3e00" },
  par:    { bg: "#70AD47", text: "#fff"    },
  max:    { bg: "#4BACC6", text: "#fff"    },
  order:  { bg: "#7030A0", text: "#fff"    },
};

const SEC_COLORS = {
  garnish: { bg: "#FFF9C4", text: "#5a3e00", border: "#FFD600" },
  stirfry: { bg: "#E2EFDA", text: "#375623", border: "#70AD47" },
  curry:   { bg: "#FCE4D6", text: "#833C0B", border: "#FF6B35" },
  misc:    { bg: "#DAE3F3", text: "#1F3864", border: "#4472C4" },
};

const SECTIONS = [
  { id: "garnish", label: "🍋 Garnishes"  },
  { id: "stirfry", label: "🥢 Stir-fry"   },
  { id: "curry",   label: "🍛 Curry"       },
  { id: "misc",    label: "🧺 Misc"        },
];

// par = minimum (order when below this)
// max = maximum (order up to this level)
// orderQty = max - stock (auto-calc, never negative)
// presets = array of stock level options shown as buttons, e.g. [0, 0.25, 0.5, 1]
function calcOrder(item) {
  const raw = parseFloat((item.max - item.stock).toFixed(3));
  if (raw <= 0) return 0;
  if (item.minOrder && item.minOrder > 0) {
    // only trigger order if stock is at or below par
    if (item.stock > item.par) return 0;
    return Math.ceil(raw / item.minOrder) * item.minOrder;
  }
  // round up to whole number for "ea" unit items
  if (item.unit === "ea") return Math.ceil(raw);
  return raw;
}

function statusOf(item) {
  if (item.stock <= 0) return "out";
  if (item.stock < item.par) return "low";
  return "ok";
}

const STATUS_CFG = {
  ok:  { bg: "#E8F5E9", color: "#276749", label: "OK"  },
  low: { bg: "#FFF8E1", color: "#B45309", label: "Low" },
  out: { bg: "#FFEBEE", color: "#C53030", label: "Out" },
};

function defaultPresets(max) {
  // sensible defaults based on max value
  if (max <= 1)   return [0, parseFloat((max*0.25).toFixed(2)), parseFloat((max*0.5).toFixed(2)), max];
  if (max <= 5)   return [0, parseFloat((max*0.25).toFixed(1)), parseFloat((max*0.5).toFixed(1)), max];
  return [0, Math.round(max*0.25), Math.round(max*0.5), max];
}

const INITIAL_ITEMS = [
  // ── Garnishes ──
  { id:"g1",  sec:"garnish", name:"Lemon",           unit:"kg",       stock:0, par:1,    max:4,  presets:[0,1,2,3,4] },
  { id:"g2",  sec:"garnish", name:"Cucumber",        unit:"kg",       stock:0, par:2,    max:5,  presets:[1,2,3,5] },
  { id:"g3",  sec:"garnish", name:"Spring onion",    unit:"bunches",  stock:0, par:2,    max:5,  presets:[0,2,3,4,5] },
  { id:"g4",  sec:"garnish", name:"Viola flower",    unit:"punnets",  stock:0, par:1,    max:2,  presets:[0,1,2] },
  { id:"g5",  sec:"garnish", name:"Red cabbage",     unit:"ea",       stock:0, par:1,    max:2,  presets:[0,0.5,1,2] },
  { id:"g6",  sec:"garnish", name:"Cabbage",         unit:"ea",       stock:0, par:1,    max:2,  presets:[0,0.5,1,2] },
  // ── Stir-fry ──
  { id:"s1",  sec:"stirfry", name:"Red capsicum",    unit:"kg",       stock:0, par:3,    max:5,  presets:[0,1,2,3,5] },
  { id:"s2",  sec:"stirfry", name:"Green capsicum",  unit:"kg",       stock:0, par:3,    max:5,  presets:[0,1,2,3,5] },
  { id:"s3",  sec:"stirfry", name:"Carrots",         unit:"case",     stock:0, par:0.25, max:1,  presets:[0,1],            note:"Min order 1 case", minOrder:1 },
  { id:"s4",  sec:"stirfry", name:"Cauliflower",     unit:"ea",       stock:0, par:2,    max:8,  presets:[0,4,8] },
  { id:"s5",  sec:"stirfry", name:"Chinese broccoli",unit:"ea",       stock:0, par:2,    max:8,  presets:[0,4,8] },
  { id:"s6",  sec:"stirfry", name:"Zucchini",        unit:"kg",       stock:0, par:3,    max:5,  presets:[0,1,2,3,5] },
  { id:"s7",  sec:"stirfry", name:"Green bean",      unit:"kg",       stock:0, par:1,    max:5,  presets:[0,1,2,3,5] },
  { id:"s8",  sec:"stirfry", name:"Basil",           unit:"kg",       stock:0, par:1,    max:2,  presets:[0,1,2] },
  { id:"s9",  sec:"stirfry", name:"Garlic",          unit:"bags",     stock:0, par:2,    max:5,  presets:[0,1,2,3] },
  { id:"s10", sec:"stirfry", name:"Onion",           unit:"bag(20kg)",stock:0, par:0.25, max:1,  presets:[0,0.25,0.5,1],   note:"Min order 1 bag (20kg)", minOrder:1 },
  { id:"s11", sec:"stirfry", name:"Bean sprout",     unit:"kg",       stock:0, par:2.5,  max:5,  presets:[0,1,2.5,5],      note:"Min order 5 kg", minOrder:5 },
  { id:"s12", sec:"stirfry", name:"Chives",          unit:"kg",       stock:0, par:1,    max:2,  presets:[0,1,2] },
  // ── Curry ──
  { id:"c1",  sec:"curry",   name:"Potatoes",        unit:"bag",      stock:0, par:0.25, max:1,  presets:[0,0.25,0.5,0.75,1], note:"Min order 1 bag", minOrder:1 },
  { id:"c2",  sec:"curry",   name:"Dutch potatoes",  unit:"bag",      stock:0, par:0.25, max:1,  presets:[0,0.25,0.5,0.75,1], note:"Min order 1 bag", minOrder:1 },
  { id:"c3",  sec:"curry",   name:"Coriander",       unit:"bunch",    stock:0, par:1,    max:2,  presets:[0,1,2] },
  { id:"c4",  sec:"curry",   name:"Eggplant",        unit:"kg",       stock:0, par:1,    max:3,  presets:[0,1,2,3] },
  // ── Misc ──
  { id:"m1",  sec:"misc",    name:"Ginger",          unit:"kg",       stock:0, par:0.2,  max:1,  presets:[0,0.5,1] },
  { id:"m2",  sec:"misc",    name:"Lettuce",         unit:"ea",       stock:0, par:0.5,  max:1,  presets:[0,0.5,1],  note:"Min order 1 ea", minOrder:1 },
  { id:"m3",  sec:"misc",    name:"Celery",          unit:"bunch",    stock:0, par:0,    max:1,  presets:[0,1],  note:"Min order 1 bunch", minOrder:1 },
];


const TABS = [
  { id: "stock",   label: "Stock"      },
  { id: "order",   label: "Order List" },
  { id: "history", label: "History"    },
];

const SK = "kitchen_stock_v6";
const HK = "kitchen_history_v6";
const TK = "kitchen_title_v6";
function ls(key, fb) { try { const s=localStorage.getItem(key); if(s) return JSON.parse(s); } catch(e){} return fb; }
function ss(key,val) { try { localStorage.setItem(key,JSON.stringify(val)); } catch(e){} }

function fmtDate(ts) {
  const d=new Date(ts);
  return `${d.getDate()}/${d.getMonth()+1}/${String(d.getFullYear()).slice(-2)} `
       + `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}

// ── Shared styles ─────────────────────────────────────────────────────────────
const iStyle     = { width:"100%", padding:"10px 12px", borderRadius:10, border:"1.5px solid #E5E7EB", fontSize:14, boxSizing:"border-box" };
const primaryBtn = { flex:1, padding:"12px", borderRadius:12, border:"none", background:"#1a1a2e", color:"#fff", fontWeight:700, cursor:"pointer", fontSize:14 };
const cancelBtn  = { flex:1, padding:"12px", borderRadius:12, border:"1.5px solid #E5E7EB", background:"#fff", color:"#555", fontWeight:600, cursor:"pointer", fontSize:14 };
const dangerBtn  = { width:"100%", padding:"12px", borderRadius:12, border:"none", background:"#FEF2F2", color:"#E53E3E", fontWeight:700, cursor:"pointer", fontSize:14, marginBottom:8 };

function Modal({ children, onClose }) {
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.45)", display:"flex",
      alignItems:"flex-end", justifyContent:"center", zIndex:500, padding:16 }}
      onClick={e => e.target===e.currentTarget && onClose()}>
      <div style={{ background:"#fff", borderRadius:20, padding:24, width:"100%", maxWidth:430,
        maxHeight:"88vh", overflowY:"auto" }}>
        {children}
      </div>
    </div>
  );
}

// ── Edit Item Modal ───────────────────────────────────────────────────────────
function EditItemModal({ item, onSave, onDelete, onClose }) {
  const [d, setD] = useState({ ...item });
  const [presetsStr, setPresetsStr] = useState((item.presets||[]).join(", "));

  const parsePresets = (str) => {
    return str.split(",").map(s=>parseFloat(s.trim())).filter(n=>!isNaN(n) && n>=0).sort((a,b)=>a-b);
  };

  const handleSave = () => {
    const presets = parsePresets(presetsStr);
    onSave({ ...d, presets: presets.length ? presets : defaultPresets(d.max) });
  };

  return (
    <Modal onClose={onClose}>
      <div style={{ fontWeight:700, fontSize:16, marginBottom:16 }}>✏️ Edit: {item.name}</div>
      <div style={{ display:"flex", flexDirection:"column", gap:12 }}>

        <div>
          <div style={{ fontSize:12, color:"#888", marginBottom:4 }}>Item name</div>
          <input style={iStyle} value={d.name} onChange={e=>setD({...d,name:e.target.value})} />
        </div>

        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
          <div>
            <div style={{ fontSize:12, color:"#888", marginBottom:4 }}>Unit</div>
            <input style={iStyle} value={d.unit} onChange={e=>setD({...d,unit:e.target.value})} />
          </div>
          <div>
            <div style={{ fontSize:12, color:"#888", marginBottom:4 }}>Category</div>
            <select style={iStyle} value={d.sec} onChange={e=>setD({...d,sec:e.target.value})}>
              <option value="vegetable">🥬 Vegetables</option>
              <option value="meat">🥩 Meat & Seafood</option>
              <option value="other">🧴 Other</option>
            </select>
          </div>
        </div>

        <div style={{ background:"#F9FAFB", borderRadius:12, padding:14, border:"1px solid #E5E7EB" }}>
          <div style={{ fontWeight:700, fontSize:13, marginBottom:10, color:"#1a1a2e" }}>📊 Stock levels</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
            <div>
              <div style={{ fontSize:12, color:"#888", marginBottom:4 }}>Par level <span style={{color:"#B45309"}}>(order when below)</span></div>
              <input style={iStyle} type="number" step="0.25" min="0" value={d.par}
                onChange={e=>setD({...d,par:parseFloat(e.target.value)||0})} />
            </div>
            <div>
              <div style={{ fontSize:12, color:"#888", marginBottom:4 }}>Maximum stock <span style={{color:"#276749"}}>(order up to)</span></div>
              <input style={iStyle} type="number" step="0.25" min="0" value={d.max}
                onChange={e=>setD({...d,max:parseFloat(e.target.value)||0})} />
            </div>
          </div>
        </div>

        <div style={{ background:"#F9FAFB", borderRadius:12, padding:14, border:"1px solid #E5E7EB" }}>
          <div style={{ fontWeight:700, fontSize:13, marginBottom:6, color:"#1a1a2e" }}>🔘 Stock preset buttons</div>
          <div style={{ fontSize:12, color:"#888", marginBottom:8 }}>
            Enter values separated by commas. These become the tap buttons when doing a stock check.
          </div>
          <input style={iStyle} value={presetsStr}
            onChange={e=>setPresetsStr(e.target.value)}
            placeholder="e.g. 0, 0.25, 0.5, 1" />
          <div style={{ display:"flex", gap:6, marginTop:10, flexWrap:"wrap" }}>
            {parsePresets(presetsStr).map((v,i)=>(
              <span key={i} style={{ background:"#E0E7FF", color:"#3730A3", borderRadius:8,
                padding:"4px 10px", fontSize:12, fontWeight:700 }}>
                {v===0?"Out":v}
              </span>
            ))}
          </div>
        </div>

        <div style={{ background:"#EDE9FE", borderRadius:10, padding:12, fontSize:12, color:"#6D28D9" }}>
          <b>Order qty formula:</b> Max ({d.max}) − Current stock = auto-calculated
        </div>

        <button onClick={() => onDelete(item.id)} style={dangerBtn}>🗑 Delete item</button>
        <div style={{ display:"flex", gap:8 }}>
          <button onClick={onClose} style={cancelBtn}>Cancel</button>
          <button onClick={handleSave} style={primaryBtn}>💾 Save</button>
        </div>
      </div>
    </Modal>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [items,   setItems]   = useState(() => ls(SK, INITIAL_ITEMS));
  const [history, setHistory] = useState(() => ls(HK, []));
  const [title,   setTitle]   = useState(() => ls(TK, "Kitchen Stock"));
  const [activeTab, setActiveTab] = useState("stock");

  const [editId,         setEditId]         = useState(null);
  const [addSec,         setAddSec]         = useState(null);
  const [confirmReset,   setConfirmReset]   = useState(false);
  const [confirmReceive, setConfirmReceive] = useState(false);
  const [confirmClear,   setConfirmClear]   = useState(false);
  const [editTitleOpen,  setEditTitleOpen]  = useState(false);
  const [tempTitle,      setTempTitle]      = useState("");
  const [shareModal,     setShareModal]     = useState(false);
  const [shareTitle,     setShareTitle]     = useState("Vegetables order");
  const [shareDateOffset, setShareDateOffset] = useState(1); // 1 = tomorrow by default
  const [manualQty,     setManualQty]     = useState({});  // per-item order qty overrides
  const [toast,          setToast]          = useState(null);

  // Add item form
  const [newName,  setNewName]  = useState("");
  const [newUnit,  setNewUnit]  = useState("kg");
  const [newPar,   setNewPar]   = useState("");
  const [newMax,   setNewMax]   = useState("");

  useEffect(() => { ss(SK, items);   }, [items]);
  useEffect(() => { ss(HK, history); }, [history]);
  useEffect(() => { ss(TK, title);   }, [title]);

  const showToast = (msg, type="ok") => { setToast({msg,type}); setTimeout(()=>setToast(null), 2800); };

  const editItem   = useMemo(() => items.find(i=>i.id===editId)||null, [items, editId]);
  // Order items = those where order qty > 0 (auto-calc)
  // effective order qty: manual override or auto-calc
  const getOQ = (item) => {
    if (item.minOrder && item.minOrder > 0) return calcOrder(item); // always auto for minOrder items
    const m = manualQty[item.id];
    return (m !== undefined) ? m : calcOrder(item);
  };
  const setOQ = (id, val) => {
    const item = items.find(i=>i.id===id);
    if (item?.minOrder && item.minOrder > 0) return; // locked — no manual override
    setManualQty(p => ({ ...p, [id]: Math.max(0, parseFloat(val.toFixed(3))) }));
  };
  const adjOQ = (id, delta) => {
    const item = items.find(i=>i.id===id);
    if (!item || (item.minOrder && item.minOrder > 0)) return; // locked
    const cur = getOQ(item);
    setOQ(id, cur + delta);
  };

  const orderItems = useMemo(() => items.filter(i => {
    const m = manualQty[i.id];
    return m !== undefined ? m > 0 : calcOrder(i) > 0;
  }), [items, manualQty]);
  const alertCount = useMemo(() => items.filter(i=>statusOf(i)!=="ok").length, [items]);

  // ── Set stock via preset button ───────────────────────────────────────────
  const setStock = (id, val) =>
    setItems(p => p.map(i => i.id!==id ? i : { ...i, stock: val }));

  // ── Receive all items in order ────────────────────────────────────────────
  const receiveOrder = () => {
    const log = { id:Date.now(), ts:Date.now(),
      rows: orderItems.map(i=>({ name:i.name, qty:getOQ(i), unit:i.unit })) };
    setItems(p => p.map(i => {
      const oq = getOQ(i);
      if (oq <= 0) return i;
      return { ...i, stock: parseFloat(Math.min(i.max, i.stock + oq).toFixed(3)) };
    }));
    setManualQty({});
    setHistory(p => [log,...p].slice(0,80));
    setConfirmReceive(false);
    showToast(`✅ ${log.rows.length} items received — stock updated to max`);
    setActiveTab("stock");
  };

  const clearOrder = () => {
    // "clear order" = set all items to max stock
    setConfirmClear(false);
    showToast("No changes made — order qty is auto-calculated");
  };

  const saveEdit = (updated) => {
    setItems(p => p.map(i => i.id!==updated.id ? i : updated));
    setEditId(null);
    showToast(`${updated.name} saved!`);
  };

  const deleteItem = (id) => {
    const name = items.find(i=>i.id===id)?.name;
    setItems(p => p.filter(i=>i.id!==id));
    setEditId(null);
    showToast(`${name} deleted!`);
  };

  const addItem = () => {
    if (!newName.trim() || !addSec) return;
    const maxVal = parseFloat(newMax)||1;
    const parVal = parseFloat(newPar)||maxVal/2;
    const ni = { id:"i"+Date.now(), sec:addSec, name:newName.trim(),
      unit:newUnit||"kg", stock:0, par:parVal, max:maxVal,
      presets: defaultPresets(maxVal) };
    setItems(p => [...p, ni]);
    setNewName(""); setNewPar(""); setNewMax(""); setAddSec(null);
    showToast(`${ni.name} added!`);
  };

  const resetAll = () => {
    setItems(INITIAL_ITEMS); setHistory([]); setTitle("Kitchen Stock");
    [SK,HK,TK].forEach(k=>localStorage.removeItem(k));
    setConfirmReset(false); setActiveTab("stock");
    showToast("Reset to default template!");
  };

  // ── Share ──────────────────────────────────────────────────────────────────
  const buildOrderText = () => {
    const d = new Date(); d.setDate(d.getDate() + shareDateOffset);
    const date = d.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
    let lines = [`${shareTitle} for ${date}`, ""];
    SECTIONS.forEach(sec => {
      const rows = orderItems.filter(i=>i.sec===sec.id);
      if (!rows.length) return;
      lines.push(sec.label);
      rows.forEach(i => lines.push(`• ${i.name}  ${getOQ(i)} ${i.unit}`));
      lines.push("");
    });
    return lines.join("\n").trim();
  };

  const handleShare = async () => {
    setShareDateOffset(1); // reset to tomorrow each time
    setShareModal(true);
  };

  // ── Table layout ───────────────────────────────────────────────────────────
  const NAME_W  = 90;
  const PRESET_W = 180;   // wide column for preset buttons
  const NUM_W   = 46;

  return (
    <div style={{ fontFamily:"'Segoe UI', Tahoma, sans-serif", background:"#EDEDED", minHeight:"100vh" }}>

      {/* Nav */}
      <div style={{ background:"#1a1a2e", padding:"10px 12px", display:"flex", alignItems:"center",
        gap:8, flexWrap:"wrap", position:"sticky", top:0, zIndex:100 }}>
        <span style={{ color:"#fff", fontWeight:800, fontSize:13, letterSpacing:1, marginRight:4 }}>🧑‍🍳 KITCHEN STOCK</span>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setActiveTab(t.id)} style={{
            padding:"5px 14px", borderRadius:20, border:"none", cursor:"pointer",
            fontWeight:700, fontSize:12, position:"relative",
            background: activeTab===t.id ? "#7C3AED" : "rgba(255,255,255,0.12)", color:"#fff",
            boxShadow: activeTab===t.id ? "0 2px 8px rgba(124,58,237,0.5)" : "none"
          }}>
            {t.label}
            {t.id==="order" && orderItems.length>0 && (
              <span style={{ position:"absolute", top:-5, right:-4, background:"#EF4444",
                color:"#fff", fontSize:9, fontWeight:800, width:16, height:16, borderRadius:"50%",
                display:"flex", alignItems:"center", justifyContent:"center" }}>
                {orderItems.length}
              </span>
            )}
          </button>
        ))}
        <div style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:10, color:"#6EE7B7", fontWeight:700 }}>💾 Auto-saved</span>
          {activeTab==="order" && orderItems.length>0 && (
            <button onClick={handleShare}
              style={{ padding:"5px 12px", borderRadius:20, border:"none", background:"#059669",
                color:"#fff", fontWeight:700, cursor:"pointer", fontSize:12,
                display:"flex", alignItems:"center", gap:6 }}>
              📤 Share
            </button>
          )}
          <button onClick={() => setConfirmReset(true)}
            style={{ padding:"4px 10px", borderRadius:20, border:"1px solid rgba(255,100,100,0.4)",
              background:"none", color:"rgba(255,150,150,0.8)", cursor:"pointer", fontSize:11 }}>Reset</button>
        </div>
      </div>

      {/* Banner */}
      <div style={{ background:"#FFF9E6", borderBottom:"2px solid #FCD34D", padding:"6px 14px",
        display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
        {alertCount > 0 ? (
          <>
            <span style={{ fontSize:11, fontWeight:800, color:"#92400E" }}>⚠️ {alertCount} items need attention</span>
            <span style={{ fontSize:11, color:"#B45309", marginLeft:"auto" }}>Tap a preset to set stock level · tap name to edit</span>
          </>
        ) : (

                const text = buildOrderText();
                try { await navigator.clipboard.writeText(text); } catch(e) {}
                window.location.href = "line://msg/text/" + encodeURIComponent(text);
              }}
              style={{ width:"100%", padding:"14px", borderRadius:14, border:"none",
                background:"#06C755", color:"#fff", fontWeight:800, fontSize:16,
                cursor:"pointer", marginBottom:10, display:"flex",
                alignItems:"center", justifyContent:"center", gap:10 }}>
              <span style={{ fontSize:22 }}>💬</span> Open in LINE
            </button>

            <div style={{ fontSize:11, color:"#aaa", marginBottom:16 }}>
              Tap above to open LINE with the order pre-loaded
            </div>

            {/* Paste fallback */}
            <div style={{ background:"#F9F9F9", borderRadius:12, padding:"12px 14px",
              textAlign:"left", border:"1px solid #eee" }}>
              <div style={{ fontWeight:700, fontSize:12, color:"#555", marginBottom:6 }}>Or paste manually:</div>
              <div style={{ fontSize:12, color:"#555", lineHeight:1.8 }}>
                <b>iPhone:</b> Open LINE → message box → <b>Paste</b><br/>
                <b>PC:</b> Open LINE → press <code style={{ background:"#eee", padding:"1px 6px", borderRadius:4 }}>Ctrl+V</code>
              </div>
            </div>

            <button onClick={() => setShareModal(false)}
              style={{ width:"100%", marginTop:12, padding:"11px", borderRadius:12, border:"1.5px solid #E5E7EB",
                background:"#fff", color:"#555", fontWeight:600, fontSize:14, cursor:"pointer" }}>
              Close
            </button>
          </div>
        </Modal>
      )}

      {/* Toast */}
      {toast && (
        <div style={{ position:"fixed", bottom:20, left:"50%", transform:"translateX(-50%)",
          background: toast.type==="err" ? "#C62828" : "#1a1a2e",
          color:"#fff", padding:"10px 22px", borderRadius:30, fontSize:13, fontWeight:700,
          zIndex:999, boxShadow:"0 4px 20px rgba(0,0,0,0.25)", whiteSpace:"nowrap",
          maxWidth:"calc(100vw - 40px)", overflow:"hidden", textOverflow:"ellipsis" }}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
